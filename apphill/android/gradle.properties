# Project-wide Gradle settings.

# JVM memory settings (FIXED for OutOfMemoryError)
org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dhttp.nonProxyHosts=* -Dhttps.protocols=TLSv1.2,TLSv1.3

# Enable Gradle performance optimizations
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true

# Network timeout and retry configurations
org.gradle.internal.network.connect.timeout=30000
org.gradle.internal.network.read.timeout=30000
org.gradle.internal.http.requestRetry.count=3

# AndroidX support
android.useAndroidX=true

# 🔥 IMPORTANT: Reduce architectures (prevents memory crash)
# Use only one architecture for development
reactNativeArchitectures=arm64-v8a

# Hermes engine (recommended)
hermesEnabled=true

# Edge-to-edge UI (optional)
edgeToEdgeEnabled=false